<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; connect-src 'self' blob: data:;" />
  <title>Mascot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
    }

    #app {
      display: flex;
      flex-direction: row;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    #bubble-wrap {
      flex: 1 1 auto;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      position: relative;
      padding: 10px 4px 10px 10px;
    }

    #canvas-container {
      flex: 0 0 38%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* Close (×) button — top-right corner */
    #close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 14px;
      line-height: 26px;
      text-align: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #canvas-container:hover #close-btn { opacity: 1; }
    #close-btn:hover { background: rgba(200, 50, 50, 0.7); }

    /* Loading spinner */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: rgba(255,255,255,0.7);
      font-family: system-ui, sans-serif;
      font-size: 12px;
      pointer-events: none;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: rgba(255,255,255,0.7);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error state */
    #error-msg {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(255,180,180,0.9);
      font-family: system-ui, sans-serif;
      font-size: 12px;
      text-align: center;
      padding: 20px;
      gap: 8px;
    }
    #error-msg.visible { display: flex; }

    /* Cloud-style speech bubble — sits beside the mascot, tail points right */
    #speech-bubble {
      position: relative;
      --bubble-x: 52px;
      --bubble-y: -19px;
      transform: scale(0.9) translate(var(--bubble-x), var(--bubble-y));
      max-width: 130px;
      background: #ffffff;
      color: #1a1a1a;
      border: 2px solid #c8102e;
      font-family: system-ui, sans-serif;
      font-size: 10px;
      line-height: 1.35;
      text-align: center;
      padding: 8px 10px;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
      opacity: 0;
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
    }
    #speech-bubble.visible {
      opacity: 1;
      transform: scale(1) translate(var(--bubble-x), var(--bubble-y));
    }

    /* Speech-bubble tail (pointed, not a thought-bubble's round puffs) —
       an outer red triangle behind a slightly smaller white one creates
       the appearance of a bordered pointer aimed at the mascot. */
    #speech-bubble::before {
      content: "";
      position: absolute;
      right: -16px;
      top: 50%;
      transform: translateY(-50%);
      border-style: solid;
      border-width: 9px 0 9px 16px;
      border-color: transparent transparent transparent #c8102e;
    }
    #speech-bubble::after {
      content: "";
      position: absolute;
      right: -12.5px;
      top: 50%;
      transform: translateY(-50%);
      border-style: solid;
      border-width: 7px 0 7px 13px;
      border-color: transparent transparent transparent #ffffff;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="bubble-wrap">
      <div id="speech-bubble"></div>
    </div>
    <div id="canvas-container">
      <div id="loading">
        <div class="spinner"></div>
        <span>Loading mascot…</span>
      </div>
      <div id="error-msg">
        <span style="font-size:24px">⚠️</span>
        <strong>Could not load mascot.glb</strong>
        <span id="error-detail">Make sure mascot.glb is in the assets/ folder.</span>
      </div>
      <button id="close-btn" title="Dismiss">✕</button>
    </div>
  </div>

  <!--
    Three.js and GLTFLoader are loaded from the local node_modules copy
    that gets bundled alongside the app — no internet needed at runtime.
  -->
  <script type="importmap">
    {
      "imports": {
        "three": "../node_modules/three/build/three.module.js",
        "three/addons/": "../node_modules/three/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const container = document.getElementById('canvas-container');
    const loadingEl = document.getElementById('loading');
    const errorEl   = document.getElementById('error-msg');
    const errorDetail = document.getElementById('error-detail');
    const bubbleEl  = document.getElementById('speech-bubble');

    // Editable settings (schedule, messages, bubble position/size, mascot
    // size/rotation) live in config.json at the project root — edit that
    // instead of this script.
    const DEFAULT_CONFIG = {
      devMode: false,
      messages: [
        "👋 Hi there! Small acts of inclusion make a big difference.",
      ],
      bubble: { offsetXPx: 52, offsetYPx: -19, maxWidthPx: 130, fontSizePx: 10, messageDisplaySeconds: 4.5 },
      mascot: { sizeUnits: 0.9, rotationDeg: -81.8 },
    };

    async function loadConfig() {
      try {
        const res = await fetch('../config.json');
        const loaded = await res.json();
        return {
          devMode: !!loaded.devMode,
          messages: loaded.messages?.length ? loaded.messages : DEFAULT_CONFIG.messages,
          bubble: { ...DEFAULT_CONFIG.bubble, ...loaded.bubble },
          mascot: { ...DEFAULT_CONFIG.mascot, ...loaded.mascot },
        };
      } catch (e) {
        console.warn('[mascot] failed to load config.json, using defaults', e);
        return DEFAULT_CONFIG;
      }
    }

    const config = await loadConfig();
    const MESSAGES = config.messages;

    bubbleEl.style.setProperty('--bubble-x', `${config.bubble.offsetXPx}px`);
    bubbleEl.style.setProperty('--bubble-y', `${config.bubble.offsetYPx}px`);
    bubbleEl.style.maxWidth = `${config.bubble.maxWidthPx}px`;
    bubbleEl.style.fontSize = `${config.bubble.fontSizePx}px`;

    function showSpeechBubble(text) {
      bubbleEl.textContent = text;
      // Force reflow so the transition reliably triggers
      void bubbleEl.offsetWidth;
      bubbleEl.classList.add('visible');
    }

    function hideSpeechBubble() {
      bubbleEl.classList.remove('visible');
    }

    const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    // Show every configured message in turn, then hand control back to the
    // main process to fade the window out to the tray. In devMode, loop
    // forever instead so the popup stays up while you're iterating on it.
    async function runMessageSequence() {
      const displayMs = Math.max(500, (config.bubble.messageDisplaySeconds || 4.5) * 1000);
      do {
        for (const message of MESSAGES) {
          showSpeechBubble(message);
          await sleep(displayMs);
          hideSpeechBubble();
          await sleep(350); // let the fade-out finish before the next message
        }
      } while (config.devMode);
      window.mascot.dismiss();
    }

    // ── Renderer ──────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputEncoding = THREE.sRGBEncoding;
    container.appendChild(renderer.domElement);

    // ── Scene ──────────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    // No background — keeps the window truly transparent

    // ── Camera ──────────────────────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(
      45,
      container.clientWidth / container.clientHeight,
      0.01,
      100
    );
    camera.position.set(0, 1, 3);

    // ── Lights ────────────────────────────────────────────────────────────
    const ambient = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambient);

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.5);
    keyLight.position.set(3, 5, 3);
    keyLight.castShadow = true;
    // Tight shadow-camera frustum since the mascot is only ~1 unit tall —
    // keeps the shadow map resolution focused instead of spread over a huge area.
    keyLight.shadow.mapSize.set(1024, 1024);
    keyLight.shadow.camera.near = 0.1;
    keyLight.shadow.camera.far = 10;
    keyLight.shadow.camera.left = -1.5;
    keyLight.shadow.camera.right = 1.5;
    keyLight.shadow.camera.top = 1.5;
    keyLight.shadow.camera.bottom = -1.5;
    keyLight.shadow.bias = -0.002;
    keyLight.shadow.radius = 4;
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.6);
    fillLight.position.set(-3, 2, -3);
    scene.add(fillLight);

    // Invisible shadow-catcher plane — only its shadowed area renders (as
    // translucent dark), so the transparent window background shows through
    // everywhere else. Grounds the mascot instead of leaving it floating.
    const shadowPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(6, 6),
      new THREE.ShadowMaterial({ opacity: 0.35 })
    );
    shadowPlane.rotation.x = -Math.PI / 2;
    shadowPlane.receiveShadow = true;
    scene.add(shadowPlane);

    // Improve color rendering for sRGB glTF textures and materials
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;

    // ── OrbitControls (optional — lets the user spin the model) ─────────
      const controls = new OrbitControls(camera, renderer.domElement);
    controls.enablePan   = false;
    controls.enableZoom  = false;
    controls.autoRotate  = false;      // disable auto-spin
    controls.autoRotateSpeed = 0;
      controls.target.set(0, 0.8, 0);
    controls.update();

    // ── Load the GLB ──────────────────────────────────────────────────────
    const loader = new GLTFLoader();
    const glbPath = '../assets/color_model.glb';
    console.log('[mascot] Attempting to load GLB:', glbPath);
    loader.load(
      glbPath,

      // onLoad
      (gltf) => {
        loadingEl.style.display = 'none';
        console.log('[mascot] GLTF loaded:', gltf);

        const model = gltf.scene;
          // Default yaw to apply to the model, sourced from config.json (degrees).
          const DEFAULT_MODEL_ROT_Y = config.mascot.rotationDeg * (Math.PI / 180);

        // Centre and fit the model automatically
        const box = new THREE.Box3().setFromObject(model);
        const size   = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale  = config.mascot.sizeUnits / maxDim;

        model.scale.setScalar(scale);
        model.position.sub(center.multiplyScalar(scale));

        // Ensure the model's bottom sits above the scene origin so legs aren't cut off
        // Recompute bounding box after scaling/centering and lift if needed.
        box.setFromObject(model);
        const minY = box.min.y;
        if (Number.isFinite(minY)) {
          // Move model up so minY becomes a small positive value (padding 0.02)
          model.position.y -= (minY - 0.02);
        }

          // Apply default rotation so the model faces the camera correctly out-of-the-box
          model.rotation.y = DEFAULT_MODEL_ROT_Y;

          // Recompute center and align controls/camera to the model center
          box.setFromObject(model);
          const modelCenter = box.getCenter(new THREE.Vector3());
          controls.target.copy(modelCenter);
          camera.lookAt(modelCenter);

          // Sit the shadow-catcher plane right at the model's feet
          shadowPlane.position.y = box.min.y;

        // Ensure mesh materials use correct color space for textures and receive shadows
        model.traverse((node) => {
          if (node.isMesh) {
            const mat = node.material;
            if (mat) {
              // Log material info for debugging colors
              try {
                console.log('[mascot] mesh:', node.name || '(unnamed)', 'material:', mat.type, 'color:', mat.color ? mat.color.getHexString() : null);
                if (mat.map) console.log('[mascot]  has map (texture) - uuid:', mat.map.uuid);
                if (mat.emissiveMap) console.log('[mascot]  has emissiveMap - uuid:', mat.emissiveMap.uuid);
                if (mat.metalnessMap) console.log('[mascot]  has metalnessMap - uuid:', mat.metalnessMap.uuid);
              } catch (e) {
                console.warn('[mascot] failed to read material info', e);
              }
              // Ensure common texture maps are interpreted as sRGB for correct colors
              // (base material color is already treated as sRGB by three's color management,
              // and GLTFLoader sets colorSpace on these maps automatically — this just guards
              // against any that slipped through as linear)
              ['map', 'emissiveMap'].forEach((k) => {
                if (mat[k] && mat[k].colorSpace !== THREE.SRGBColorSpace) {
                  mat[k].colorSpace = THREE.SRGBColorSpace;
                }
              });

              // Normal and metallic/roughness maps should remain linear (do not change)

              mat.needsUpdate = true;
            }
            node.castShadow = true;
            node.receiveShadow = true;
          }
        });

        scene.add(model);

        // Cycle through every configured message, then dismiss back to the tray
        setTimeout(() => runMessageSequence(), 400);

        // Play the first animation clip if present
        if (gltf.animations.length > 0) {
          const mixer = new THREE.AnimationMixer(model);
          mixer.clipAction(gltf.animations[0]).play();

          const clock = new THREE.Clock();
          renderer.setAnimationLoop(() => {
            const delta = clock.getDelta();
            mixer.update(delta);
            // Keep renderer/camera size and DPR in sync (fixes scaling when window moves between displays)
            ensureRendererSize();
            controls.update();
            renderer.render(scene, camera);
          });
        } else {
          renderer.setAnimationLoop(() => {
            // Keep renderer/camera size and DPR in sync
            ensureRendererSize();
            controls.update();
            renderer.render(scene, camera);
          });
        }
      },

      // onProgress
      (xhr) => {
        const pct = Math.round((xhr.loaded / xhr.total) * 100);
        const span = loadingEl.querySelector('span');
        if (span) span.textContent = `Loading… ${pct}%`;
      },

      // onError
      (err) => {
        loadingEl.style.display = 'none';
        errorEl.classList.add('visible');
        errorDetail.textContent = String(err.message || err);
        console.error('GLTFLoader error:', err);
      }
    );

    // ── Resize handler ─────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    // Ensure renderer size and device pixel ratio are kept up-to-date.
    function ensureRendererSize() {
      const width = Math.max(1, container.clientWidth);
      const height = Math.max(1, container.clientHeight);
      const DPR = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
      // Only update if size or DPR changed to avoid unnecessary work
      const needResize = renderer.domElement.width !== Math.floor(width * DPR) ||
                         renderer.domElement.height !== Math.floor(height * DPR) ||
                         renderer.getPixelRatio() !== DPR;
      if (needResize) {
        renderer.setPixelRatio(DPR);
        renderer.setSize(width, height, false);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
      }
    }

    // Call once to prime sizes
    ensureRendererSize();

    // ── Close button ───────────────────────────────────────────────────────
    const closeBtn = document.getElementById('close-btn');
    closeBtn.addEventListener('click', () => {
      window.mascot.dismiss();
    });

    // ── Right-drag to move the window (left-drag is reserved for
    // OrbitControls' rotate gesture). ──────────────────────────────────────
    renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());

    let dragging = false;
    let lastScreenX = 0;
    let lastScreenY = 0;

    renderer.domElement.addEventListener('pointerdown', (e) => {
      if (e.button !== 2) return;
      dragging = true;
      lastScreenX = e.screenX;
      lastScreenY = e.screenY;
    });

    window.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const dx = e.screenX - lastScreenX;
      const dy = e.screenY - lastScreenY;
      lastScreenX = e.screenX;
      lastScreenY = e.screenY;
      window.mascot.moveWindow(dx, dy);
    });

    window.addEventListener('pointerup', (e) => {
      if (e.button === 2) dragging = false;
    });
  </script>
</body>
</html>
