<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; connect-src 'self' blob: data:;" />
  <title>Mascot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
    }

    #app {
      display: flex;
      flex-direction: row;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    #bubble-wrap {
      flex: 1 1 auto;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      position: relative;
      padding: 10px 4px 10px 10px;
    }

    #canvas-container {
      flex: 0 0 38%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* Close (×) button — top-right corner */
    #close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 14px;
      line-height: 26px;
      text-align: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #canvas-container:hover #close-btn { opacity: 1; }
    #close-btn:hover { background: rgba(200, 50, 50, 0.7); }

    /* Loading spinner */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: rgba(255,255,255,0.7);
      font-family: system-ui, sans-serif;
      font-size: 12px;
      pointer-events: none;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: rgba(255,255,255,0.7);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error state */
    #error-msg {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(255,180,180,0.9);
      font-family: system-ui, sans-serif;
      font-size: 12px;
      text-align: center;
      padding: 20px;
      gap: 8px;
    }
    #error-msg.visible { display: flex; }

    @font-face {
      font-family: 'DM Sans';
      font-style: normal;
      font-weight: 400;
      src: url('./vendor/fonts/DMSans-Regular.ttf') format('truetype');
    }
    @font-face {
      font-family: 'DM Sans';
      font-style: normal;
      font-weight: 700;
      src: url('./vendor/fonts/DMSans-Bold.ttf') format('truetype');
    }

    /* Cloud-style speech bubble — sits beside the mascot, tail points right */
    #speech-bubble {
      position: relative;
      --bubble-x: 52px;
      --bubble-y: -19px;
      transform: scale(0.9) translate(var(--bubble-x), var(--bubble-y));
      max-width: 130px;
      background: #ffffff;
      color: #1a1a1a;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 12px;
      line-height: 1.35;
      text-align: center;
      padding: 8px 10px;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
      opacity: 0;
      transition: opacity 0.35s ease, transform 0.35s ease, box-shadow 1.6s ease-in-out;
      pointer-events: none;
    }
    #speech-bubble.visible {
      opacity: 1;
      transform: scale(1) translate(var(--bubble-x), var(--bubble-y));
      animation: bubble-glow 2.4s ease-in-out infinite;
    }
    @keyframes bubble-glow {
      0%, 100% { box-shadow: 0 4px 14px rgba(0,0,0,0.25), 0 0 6px 0 rgba(255,201,60,0.35); }
      50%      { box-shadow: 0 4px 14px rgba(0,0,0,0.25), 0 0 14px 3px rgba(255,201,60,0.75); }
    }

    /* Twinkling sparkle stars around the bubble */
    .sparkle {
      position: absolute;
      font-size: 11px;
      line-height: 1;
      pointer-events: none;
      animation: sparkle-twinkle 1.8s ease-in-out infinite;
      filter: drop-shadow(0 0 2px rgba(255,215,0,0.8));
    }
    .sparkle-1 { top: -8px;  left: -6px;  font-size: 13px; animation-delay: 0s; }
    .sparkle-2 { top: -4px;  right: 22px; font-size: 9px;  animation-delay: 0.5s; }
    .sparkle-3 { bottom: -9px; left: 18px; font-size: 10px; animation-delay: 1s; }
    @keyframes sparkle-twinkle {
      0%, 100% { opacity: 0.15; transform: scale(0.5) rotate(0deg); }
      50%      { opacity: 1;    transform: scale(1.2) rotate(20deg); }
    }

    /* Speech-bubble tail (pointed, not a thought-bubble's round puffs) —
       plain white, no border, aimed at the mascot. */
    #speech-bubble::after {
      content: "";
      position: absolute;
      right: -14px;
      top: 50%;
      transform: translateY(-50%);
      border-style: solid;
      border-width: 8px 0 8px 14px;
      border-color: transparent transparent transparent #ffffff;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="bubble-wrap">
      <div id="speech-bubble">
        <span class="sparkle sparkle-1">✨</span>
        <span class="sparkle sparkle-2">✨</span>
        <span class="sparkle sparkle-3">✨</span>
        <span id="bubble-text"></span>
      </div>
    </div>
    <div id="canvas-container">
      <div id="loading">
        <div class="spinner"></div>
        <span>Loading mascot…</span>
      </div>
      <div id="error-msg">
        <span style="font-size:24px">⚠️</span>
        <strong>Could not load mascot.glb</strong>
        <span id="error-detail">Make sure mascot.glb is in the assets/ folder.</span>
      </div>
      <button id="close-btn" title="Dismiss">✕</button>
    </div>
  </div>

  <!--
    Three.js core is loaded from the local node_modules copy (no internet
    needed at runtime). GLTFLoader/OrbitControls are loaded from
    renderer/vendor/three-addons/, NOT node_modules/three/examples/jsm/ —
    electron-builder's packager hardcodes any directory literally named
    "example"/"examples" as always-excluded from node_modules when bundling
    (see NodeModuleCopyHelper.js), so those addon files would silently go
    missing from a packaged build. Vendoring sidesteps that entirely — see
    TECHNICAL.md.
  -->
  <script type="importmap">
    {
      "imports": {
        "three": "../node_modules/three/build/three.module.js",
        "three/addons/": "./vendor/three-addons/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const container = document.getElementById('canvas-container');
    const loadingEl = document.getElementById('loading');
    const errorEl   = document.getElementById('error-msg');
    const errorDetail = document.getElementById('error-detail');
    const bubbleEl  = document.getElementById('speech-bubble');
    const bubbleTextEl = document.getElementById('bubble-text');

    // Editable settings (schedule, messages, bubble position/size, mascot
    // size/rotation) live in config.json at the project root — edit that
    // instead of this script.
    const DEFAULT_CONFIG = {
      devMode: false,
      messages: [
        "👋 Hi there! Small acts of inclusion make a big difference.",
      ],
      bubble: {
        offsetXPx: 52, offsetYPx: -19, maxWidthPx: 130, fontSizePx: 15,
        messageDisplaySeconds: 4.5, autoHideSeconds: 15,
        greetingMessage: '👋 Hi there!', goodbyeMessage: '👋 See you next time!',
      },
      mascot: { sizeUnits: 0.9, rotationDeg: -81.8 },
    };

    async function loadConfig() {
      try {
        const res = await fetch('../config.json');
        const loaded = await res.json();
        return {
          devMode: !!loaded.devMode,
          messages: loaded.messages?.length ? loaded.messages : DEFAULT_CONFIG.messages,
          bubble: { ...DEFAULT_CONFIG.bubble, ...loaded.bubble },
          mascot: { ...DEFAULT_CONFIG.mascot, ...loaded.mascot },
        };
      } catch (e) {
        console.warn('[mascot] failed to load config.json, using defaults', e);
        return DEFAULT_CONFIG;
      }
    }

    const config = await loadConfig();
    const MESSAGES = config.messages;

    bubbleEl.style.setProperty('--bubble-x', `${config.bubble.offsetXPx}px`);
    bubbleEl.style.setProperty('--bubble-y', `${config.bubble.offsetYPx}px`);
    bubbleEl.style.maxWidth = `${config.bubble.maxWidthPx}px`;
    bubbleEl.style.fontSize = `${config.bubble.fontSizePx}px`;

    function showSpeechBubble(text) {
      bubbleTextEl.textContent = text;
      // Force reflow so the transition reliably triggers
      void bubbleEl.offsetWidth;
      bubbleEl.classList.add('visible');
    }

    function hideSpeechBubble() {
      bubbleEl.classList.remove('visible');
    }

    const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    let sequenceRunning = false;

    // Plays a greeting bow, shows every configured message in turn once
    // (capped at bubble.autoHideSeconds total), then plays a farewell bow
    // before settling back on the static idle model. The mascot itself stays
    // on screen indefinitely afterward (no auto-dismiss) — hovering/clicking
    // it re-triggers this whole sequence (see the pointerenter/click
    // listeners below). This behavior is the same whether or not devMode is
    // on — devMode only affects main.js's "show immediately on launch,
    // ignoring the schedule" behavior, not this cycle.
    async function runMessageSequence() {
      if (sequenceRunning) return;
      sequenceRunning = true;

      await playBow(config.bubble.greetingMessage);

      const displayMs = Math.max(500, (config.bubble.messageDisplaySeconds || 4.5) * 1000);
      const capMs = Math.max(1000, (config.bubble.autoHideSeconds || 15) * 1000);
      const start = Date.now();
      for (const message of MESSAGES) {
        if (Date.now() - start >= capMs) break;
        showSpeechBubble(message);
        await sleep(displayMs);
        hideSpeechBubble();
        await sleep(350); // let the fade-out finish before the next message
      }

      await playBow(config.bubble.goodbyeMessage);

      sequenceRunning = false;
    }

    // ── Renderer ──────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    container.appendChild(renderer.domElement);

    // ── Scene ──────────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    // No background — keeps the window truly transparent

    // ── Camera ──────────────────────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(
      45,
      container.clientWidth / container.clientHeight,
      0.01,
      100
    );
    camera.position.set(0, 1, 3);

    // ── Lights ────────────────────────────────────────────────────────────
    const ambient = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambient);

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.5);
    keyLight.position.set(3, 5, 3);
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.6);
    fillLight.position.set(-3, 2, -3);
    scene.add(fillLight);

    // Simple static circular "spotlight pool" blob shadow — a soft radial-gradient
    // texture on a flat disc, always the same shape regardless of light/model pose
    // (unlike a real shadow map, which would trace the model's actual silhouette).
    function createBlobShadowTexture() {
      const size = 128;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
      gradient.addColorStop(0, 'rgba(0,0,0,0.45)');
      gradient.addColorStop(0.7, 'rgba(0,0,0,0.25)');
      gradient.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);
      return new THREE.CanvasTexture(canvas);
    }

    const shadowBlob = new THREE.Mesh(
      new THREE.PlaneGeometry(1, 1),
      new THREE.MeshBasicMaterial({
        map: createBlobShadowTexture(),
        transparent: true,
        depthWrite: false,
      })
    );
    shadowBlob.rotation.x = -Math.PI / 2;
    scene.add(shadowBlob);

    // Improve color rendering for sRGB glTF textures and materials
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;

    // ── OrbitControls (optional — lets the user spin the model) ─────────
      const controls = new OrbitControls(camera, renderer.domElement);
    controls.enablePan   = false;
    controls.enableZoom  = false;
    controls.autoRotate  = false;      // disable auto-spin
    controls.autoRotateSpeed = 0;
      controls.target.set(0, 0.8, 0);
    controls.update();

    // ── Load both GLBs (static idle + animated bow) ─────────────────────────
    const loader = new GLTFLoader();
    const STATIC_GLB_PATH = '../assets/DEI_mascot.glb';
    const BOW_GLB_PATH = '../assets/bowing_mascot.glb';

    function loadGLTF(path) {
      return new Promise((resolve, reject) => {
        console.log('[mascot] Attempting to load GLB:', path);
        loader.load(
          path,
          resolve,
          (xhr) => {
            const pct = Math.round((xhr.loaded / xhr.total) * 100);
            const span = loadingEl.querySelector('span');
            if (span) span.textContent = `Loading… ${pct}%`;
          },
          reject
        );
      });
    }

    // Centers/scales/rotates a loaded model the same way regardless of its
    // own source proportions, and fixes up material color spaces. Returns
    // the model's post-fit bounding box (used for shadow placement).
    function prepareModel(model) {
      const rotY = config.mascot.rotationDeg * (Math.PI / 180);

      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = config.mascot.sizeUnits / maxDim;

      model.scale.setScalar(scale);
      model.position.sub(center.multiplyScalar(scale));

      // Ensure the model's bottom sits above the scene origin so legs aren't cut off
      box.setFromObject(model);
      const minY = box.min.y;
      if (Number.isFinite(minY)) {
        model.position.y -= (minY - 0.02);
      }

      model.rotation.y = rotY;

      box.setFromObject(model);

      model.traverse((node) => {
        if (node.isMesh && node.material) {
          const mat = node.material;
          ['map', 'emissiveMap'].forEach((k) => {
            if (mat[k] && mat[k].colorSpace !== THREE.SRGBColorSpace) {
              mat[k].colorSpace = THREE.SRGBColorSpace;
            }
          });
          mat.needsUpdate = true;
        }
      });

      return { model, box, size, scale };
    }

    let bowMixer = null;
    let bowClip = null;
    let bowClipDurationMs = 1500;

    const CROSSFADE_MS = 300;

    function setModelOpacity(model, opacity) {
      model.traverse((node) => {
        if (node.isMesh && node.material) {
          const mats = Array.isArray(node.material) ? node.material : [node.material];
          mats.forEach((mat) => {
            mat.transparent = true;
            mat.opacity = opacity;
            mat.needsUpdate = true;
          });
        }
      });
    }

    // Smoothly fades hideModel out while fading showModel in (instead of an
    // instant visibility toggle), so switching between the static and bow
    // models doesn't look like an abrupt pop.
    function crossfadeModels(hideModel, showModel, durationMs = CROSSFADE_MS) {
      return new Promise((resolve) => {
        if (showModel) {
          showModel.visible = true;
          setModelOpacity(showModel, 0);
        }
        const start = Date.now();
        function step() {
          const t = Math.min(1, (Date.now() - start) / durationMs);
          if (hideModel) setModelOpacity(hideModel, 1 - t);
          if (showModel) setModelOpacity(showModel, t);
          if (t < 1) {
            requestAnimationFrame(step);
          } else {
            if (hideModel) {
              hideModel.visible = false;
              setModelOpacity(hideModel, 1); // reset so it's ready for next time
            }
            resolve();
          }
        }
        requestAnimationFrame(step);
      });
    }

    // Plays the bow animation once (if available), showing an optional
    // greeting/goodbye bubble message alongside it, and waits for it to
    // finish before crossfading back to the static model. No-ops silently
    // (aside from a brief text-only flash) if the bow model has no
    // animation clip.
    async function playBow(text) {
      if (!bowMixer || !bowClip) {
        if (text) {
          showSpeechBubble(text);
          await sleep(1500);
          hideSpeechBubble();
          await sleep(350);
        }
        return;
      }

      await crossfadeModels(staticModel, bowModel);
      bowMixer.stopAllAction();
      bowMixer.clipAction(bowClip).reset().play();
      if (text) showSpeechBubble(text);

      await sleep(bowClipDurationMs);

      if (text) {
        hideSpeechBubble();
        await sleep(350); // let the bubble fade out before the bow ends
      }
      await crossfadeModels(bowModel, staticModel);
    }

    let staticModel, bowModel;

    Promise.all([loadGLTF(STATIC_GLB_PATH), loadGLTF(BOW_GLB_PATH)])
      .then(([staticGltf, bowGltf]) => {
        loadingEl.style.display = 'none';
        console.log('[mascot] Both GLBs loaded');

        const staticFit = prepareModel(staticGltf.scene);
        const bowFit = prepareModel(bowGltf.scene);

        staticModel = staticFit.model;
        bowModel = bowFit.model;
        bowModel.visible = false;

        scene.add(staticModel);
        scene.add(bowModel);

        // Align controls/camera to the static (idle) model's center
        const modelCenter = staticFit.box.getCenter(new THREE.Vector3());
        controls.target.copy(modelCenter);
        camera.lookAt(modelCenter);

        // Sit the blob shadow at the static model's feet, sized to its footprint
        const footprint = Math.max(staticFit.size.x, staticFit.size.z) * staticFit.scale;
        shadowBlob.scale.set(footprint * 1.3, footprint * 1.3, 1);
        shadowBlob.position.set(modelCenter.x, staticFit.box.min.y, modelCenter.z);

        if (bowGltf.animations.length > 0) {
          bowClip = bowGltf.animations[0];
          bowClipDurationMs = Math.max(500, bowClip.duration * 1000);
          bowMixer = new THREE.AnimationMixer(bowModel);
          const action = bowMixer.clipAction(bowClip);
          action.setLoop(THREE.LoopOnce);
          action.clampWhenFinished = true;
        }

        const clock = new THREE.Clock();
        renderer.setAnimationLoop(() => {
          const delta = clock.getDelta();
          if (bowMixer) bowMixer.update(delta);
          // Keep renderer/camera size and DPR in sync (fixes scaling when window moves between displays)
          ensureRendererSize();
          controls.update();
          renderer.render(scene, camera);
        });

        setTimeout(() => runMessageSequence(), 400);
      })
      .catch((err) => {
        loadingEl.style.display = 'none';
        errorEl.classList.add('visible');
        errorDetail.textContent = String(err.message || err);
        console.error('GLTFLoader error:', err);
      });

    // ── Resize handler ─────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    // Ensure renderer size and device pixel ratio are kept up-to-date.
    function ensureRendererSize() {
      const width = Math.max(1, container.clientWidth);
      const height = Math.max(1, container.clientHeight);
      const DPR = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
      // Only update if size or DPR changed to avoid unnecessary work
      const needResize = renderer.domElement.width !== Math.floor(width * DPR) ||
                         renderer.domElement.height !== Math.floor(height * DPR) ||
                         renderer.getPixelRatio() !== DPR;
      if (needResize) {
        renderer.setPixelRatio(DPR);
        renderer.setSize(width, height, false);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
      }
    }

    // Call once to prime sizes
    ensureRendererSize();

    // ── Close button ───────────────────────────────────────────────────────
    const closeBtn = document.getElementById('close-btn');
    closeBtn.addEventListener('click', () => {
      window.mascot.dismiss();
    });

    // ── Hover/click the mascot to bring the message sequence back ──────────
    // (runMessageSequence() no-ops if it's already running, so rapid
    // hover/click doesn't restart or overlap an in-progress sequence.)
    renderer.domElement.addEventListener('pointerenter', () => runMessageSequence());
    renderer.domElement.addEventListener('click', () => runMessageSequence());

    // ── Right-drag to move the window (left-drag is reserved for
    // OrbitControls' rotate gesture). ──────────────────────────────────────
    renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());

    let dragging = false;
    let lastScreenX = 0;
    let lastScreenY = 0;

    renderer.domElement.addEventListener('pointerdown', (e) => {
      if (e.button !== 2) return;
      dragging = true;
      lastScreenX = e.screenX;
      lastScreenY = e.screenY;
    });

    window.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const dx = e.screenX - lastScreenX;
      const dy = e.screenY - lastScreenY;
      lastScreenX = e.screenX;
      lastScreenY = e.screenY;
      window.mascot.moveWindow(dx, dy);
    });

    window.addEventListener('pointerup', (e) => {
      if (e.button === 2) dragging = false;
    });
  </script>
</body>
</html>
